name: Test and deploy GitHub Pages

on:
  push:
    branches: [main, feat/supabase-production]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend-checks:
    runs-on: ubuntu-latest
    env:
      VITE_SUPABASE_URL: https://placeholder.supabase.co
      VITE_SUPABASE_PUBLISHABLE_KEY: sb_publishable_placeholder_for_ci
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install locked dependencies
        run: npm ci --no-audit --no-fund
      - name: Run frontend tests
        run: npm test
      - name: Type-check and build
        run: npm run build
      - if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/configure-pages@v5
      - if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  database-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: 2.101.0
      - name: Start local Postgres and apply migrations
        run: supabase db start
      - name: Run pgTAP database tests
        run: supabase test db

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: [frontend-checks, database-tests]
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
